<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUZZ תכנון פיננסי</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #090c10; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #11151d; }
  ::-webkit-scrollbar-thumb { background: #283042; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;



function gid() { return "i" + Math.random().toString(36).slice(2, 9); }
function fmt(n, cur) {
  const sym = cur === "$" ? "$" : "₪";
  const abs = Math.abs(Math.round(n));
  return n < 0 ? `${sym}${abs.toLocaleString("en-US")}-` : `${sym}${abs.toLocaleString("en-US")}`;
}

const MONTHS_HE = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

function monthKey(y, m) { return `${y}-${String(m + 1).padStart(2, "0")}`; }

const DIVS = [
  { id: "div1", name: "דיביזיה 1 — ייסוד ותקשורות" },
  { id: "div2", name: "דיביזיה 2 — הפצה" },
  { id: "div3", name: "דיביזיה 3 — אוצר" },
  { id: "div4", name: "דיביזיה 4 — ייצור" },
  { id: "div5", name: "דיביזיה 5 — הסמכות" },
  { id: "div6", name: "דיביזיה 6 — תפוצה (קידום)" },
  { id: "div7", name: "דיביזיה 7 — מנהלים" },
];

function freshMonth() {
  return {
    grossIncome: 0,
    fp1: [
      { id: gid(), desc: 'מע"מ', val: 17, isPct: true },
      { id: gid(), desc: "ביטוח לאומי", val: 10, isPct: true },
      { id: gid(), desc: "מס הכנסה", val: 10, isPct: true },
    ],
    fp2: [],
    divisions: DIVS.map(d => ({ ...d })),
    divItems: [],
    approval: {},
    payment: {},
  };
}

async function loadAll() {
  try {
    const res = await fetch("https://ughjtihrhysrwtnynydr.supabase.co/rest/v1/fp_data?id=eq.main&select=data", {
      headers: { "apikey": "sb_publishable_STybZgL44GRkqyYwmNJpgQ_fy1205Hf", "Authorization": "Bearer sb_publishable_STybZgL44GRkqyYwmNJpgQ_fy1205Hf" }
    });
    const rows = await res.json();
    if (rows && rows.length > 0 && rows[0].data) return rows[0].data;
    return null;
  } catch(e) { console.error("Load error:", e); return null; }
}
async function saveAll(d) {
  try {
    await fetch("https://ughjtihrhysrwtnynydr.supabase.co/rest/v1/fp_data?id=eq.main", {
      method: "PATCH",
      headers: {
        "apikey": "sb_publishable_STybZgL44GRkqyYwmNJpgQ_fy1205Hf",
        "Authorization": "Bearer sb_publishable_STybZgL44GRkqyYwmNJpgQ_fy1205Hf",
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ data: d, updated_at: new Date().toISOString() })
    });
  } catch(e) { console.error("Save error:", e); }
}

const C = {
  bg: "#090c10", card: "#11151d", card2: "#171c27",
  bdr: "#1e2535", bdr2: "#283042",
  tx: "#e2e6ed", txd: "#7b8a9e", txm: "#4a5568",
  blue: "#3b82f6", blueD: "#132850",
  green: "#10b981", greenD: "#0a2b20",
  red: "#ef4444", redD: "#2d0e0e",
  amber: "#f59e0b", amberD: "#2a1d06",
  purple: "#a78bfa", purpleD: "#1c1340",
  cyan: "#06b6d4", cyanD: "#0a2530",
};

const Badge = ({ children, color, bg }) => <span style={{ background: bg, color, padding: "2px 9px", borderRadius: "12px", fontSize: "11px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", whiteSpace: "nowrap" }}>{children}</span>;
const AddBtn = ({ onClick, label = "+ הוסף שורה" }) => <button onClick={onClick} style={{ marginTop: "7px", width: "100%", background: "transparent", border: `1px dashed ${C.bdr2}`, color: C.blue, padding: "8px", borderRadius: "7px", cursor: "pointer", fontSize: "11px", fontFamily: "inherit", fontWeight: 600 }} onMouseOver={e => e.currentTarget.style.borderColor = C.blue} onMouseOut={e => e.currentTarget.style.borderColor = C.bdr2}>{label}</button>;
const RemBtn = ({ onClick }) => <button onClick={onClick} style={{ background: "transparent", border: "none", color: C.txm, cursor: "pointer", fontSize: "13px", padding: "3px 5px", borderRadius: "4px", lineHeight: 1 }} onMouseOver={e => e.currentTarget.style.color = C.red} onMouseOut={e => e.currentTarget.style.color = C.txm}>✕</button>;
const NI = ({ value, onChange, color = "#60a5fa", w = "80px" }) => <input type="number" value={value} onChange={e => onChange(parseFloat(e.target.value) || 0)} style={{ background: C.bg, border: `1px solid ${C.bdr}`, color, borderRadius: "5px", padding: "5px 6px", fontSize: "12px", fontFamily: "'JetBrains Mono',monospace", textAlign: "center", outline: "none", width: w }} onFocus={e => e.currentTarget.style.borderColor = C.blue} onBlur={e => e.currentTarget.style.borderColor = C.bdr} />;
const TI = ({ value, onChange, placeholder = "" }) => <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={{ background: "transparent", border: "none", color: C.tx, fontSize: "12px", fontFamily: "inherit", outline: "none", borderBottom: `1px solid ${C.bdr}`, paddingBottom: "2px", width: "100%" }} />;
const SecTot = ({ label, value, cur, color }) => <div style={{ padding: "10px 14px", borderRadius: "9px", background: color === C.green ? C.greenD : color === C.red ? C.redD : color === C.purple ? C.purpleD : color === C.amber ? C.amberD : C.blueD, border: `1px solid ${color}20`, display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "10px" }}><span style={{ fontWeight: 600, fontSize: "12px" }}>{label}</span><span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: "15px", fontWeight: 700, color }}>{fmt(value, cur)}</span></div>;
const Chev = ({ open }) => <span style={{ transform: open ? "rotate(90deg)" : "rotate(0)", transition: "transform 0.15s", display: "inline-block", fontSize: "10px", color: C.txm }}>▶</span>;

function exportCSV(s, calcFp1, calcFp2, cur, mk) {
  const rows = [["מקור", "תיאור", "מבוקש", "מאושר", "שולם", "סטטוס"]];
  rows.push(["חודש", mk, "", "", "", ""]);
  rows.push(["הכנסה ברוטו", "", s.grossIncome, "", "", ""]);
  rows.push([]);
  const addItems = (sec, items, amtFn) => {
    items.forEach(i => {
      const amt = amtFn(i);
      const ap = s.approval[i.id]; const py = s.payment[i.id];
      const aAmt = ap?.approved ? ap.approvedAmount : 0;
      const pAmt = py?.paidAmount || 0;
      const st = !ap?.approved ? "לא מאושר" : py?.status === "paid" ? "שולם במלואו" : py?.status === "partial" ? "שולם חלקית" : "ממתין";
      rows.push([sec, i.desc || "", Math.round(amt), aAmt, pAmt, st]);
    });
  };
  rows.push(["=== FP#1 ==="]); addItems("FP#1", s.fp1, calcFp1);
  rows.push([]); rows.push(["=== הקצאות כלליות ==="]); addItems("כללי", s.fp2, calcFp2);
  (s.divisions || []).forEach(div => {
    const items = (s.divItems || []).filter(x => x.divId === div.id);
    if (items.length) { rows.push([]); rows.push([`=== ${div.name} ===`]); addItems(div.name, items, i => i.amount || 0); }
  });
  const bom = "\uFEFF";
  const csv = rows.map(r => r.map(c => `"${String(c ?? "").replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = `FP_BUZZ_${mk}.csv`; a.click(); URL.revokeObjectURL(url);
}

function App() {
  const [data, setData] = useState(null); // { currency, months: { "2026-03": {...}, ... } }
  const now = new Date();
  const [selYear, setSelYear] = useState(now.getFullYear());
  const [selMonth, setSelMonth] = useState(now.getMonth());
  const [tab, setTab] = useState("fp1");
  const [expDivs, setExpDivs] = useState({});
  const [expApp, setExpApp] = useState({ fp1: true, fp2: true });
  const [editDivName, setEditDivName] = useState(null);
  const [showReset, setShowReset] = useState(false);
  const [showCopyFrom, setShowCopyFrom] = useState(false);
  const loaded = useRef(false);

  const mk = monthKey(selYear, selMonth);

  useEffect(() => {
    loadAll().then(d => {
      if (!d) d = { currency: "₪", months: {} };
      if (!d.months) d.months = {};
      setData(d);
      DIVS.forEach(dv => setExpDivs(p => ({ ...p, [dv.id]: true })));
      loaded.current = true;
    });
  }, []);

  useEffect(() => { if (loaded.current && data) saveAll(data); }, [data]);

  const getMonth = useCallback(() => {
    if (!data) return freshMonth();
    return data.months[mk] || freshMonth();
  }, [data, mk]);

  const setMonth = useCallback((fn) => {
    setData(prev => {
      const m = prev.months[mk] || freshMonth();
      const updated = fn(m);
      return { ...prev, months: { ...prev.months, [mk]: { ...updated } } };
    });
  }, [mk]);

  if (!data) return <div style={{ background: C.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.txd, fontFamily: "system-ui" }}>טוען...</div>;

  const s = getMonth();
  const cur = data.currency || "₪";

  const calcFp1 = i => i.isPct ? (s.grossIncome * i.val / 100) : i.val;
  const fp1Plan = s.fp1.reduce((a, i) => a + calcFp1(i), 0);
  const corrGross = s.grossIncome - fp1Plan;
  const calcFp2 = i => i.isPct ? (corrGross * i.val / 100) : i.val;
  const fp2Plan = s.fp2.reduce((a, i) => a + calcFp2(i), 0);
  const divPlan = (s.divItems || []).reduce((a, i) => a + (i.amount || 0), 0);
  const totalPlan = fp1Plan + fp2Plan + divPlan;

  const allItems = [...s.fp1.map(i => ({ ...i, _amt: calcFp1(i), _src: "fp1" })), ...s.fp2.map(i => ({ ...i, _amt: calcFp2(i), _src: "fp2" })), ...(s.divItems || []).map(i => ({ ...i, _amt: i.amount || 0, _src: "div" }))];
  const totalApproved = allItems.reduce((a, i) => a + (s.approval[i.id]?.approved ? s.approval[i.id].approvedAmount : 0), 0);
  const totalPaid = allItems.reduce((a, i) => a + (s.payment[i.id]?.paidAmount || 0), 0);
  const remaining = s.grossIncome - totalApproved;

  const toggleCur = () => setData(p => ({ ...p, currency: p.currency === "₪" ? "$" : "₪" }));
  const setGross = v => setMonth(m => ({ ...m, grossIncome: v }));
  const addFp1 = () => setMonth(m => ({ ...m, fp1: [...m.fp1, { id: gid(), desc: "", val: 0, isPct: false }] }));
  const updFp1 = (id, f, v) => setMonth(m => ({ ...m, fp1: m.fp1.map(i => i.id === id ? { ...i, [f]: v } : i) }));
  const rmFp1 = id => setMonth(m => { const ap = { ...m.approval }; delete ap[id]; const py = { ...m.payment }; delete py[id]; return { ...m, fp1: m.fp1.filter(i => i.id !== id), approval: ap, payment: py }; });
  const addFp2 = () => setMonth(m => ({ ...m, fp2: [...m.fp2, { id: gid(), desc: "", val: 0, isPct: false }] }));
  const updFp2 = (id, f, v) => setMonth(m => ({ ...m, fp2: m.fp2.map(i => i.id === id ? { ...i, [f]: v } : i) }));
  const rmFp2 = id => setMonth(m => { const ap = { ...m.approval }; delete ap[id]; const py = { ...m.payment }; delete py[id]; return { ...m, fp2: m.fp2.filter(i => i.id !== id), approval: ap, payment: py }; });
  const updDivName = (id, n) => setMonth(m => ({ ...m, divisions: (m.divisions || DIVS).map(d => d.id === id ? { ...d, name: n } : d) }));
  const addDivItem = dId => setMonth(m => ({ ...m, divItems: [...(m.divItems || []), { id: gid(), divId: dId, desc: "", amount: 0 }] }));
  const updDivItem = (id, f, v) => setMonth(m => ({ ...m, divItems: (m.divItems || []).map(i => i.id === id ? { ...i, [f]: v } : i) }));
  const rmDivItem = id => setMonth(m => { const ap = { ...m.approval }; delete ap[id]; const py = { ...m.payment }; delete py[id]; return { ...m, divItems: (m.divItems || []).filter(i => i.id !== id), approval: ap, payment: py }; });
  const setApproval = (id, approved, approvedAmount) => setMonth(m => ({ ...m, approval: { ...m.approval, [id]: { approved, approvedAmount: approved ? approvedAmount : 0 } } }));
  const setPayment = (id, paidAmount) => {
    const apAmt = s.approval[id]?.approvedAmount || 0;
    const status = paidAmount >= apAmt && apAmt > 0 ? "paid" : paidAmount > 0 ? "partial" : "unpaid";
    setMonth(m => ({ ...m, payment: { ...m.payment, [id]: { status, paidAmount } } }));
  };

  const resetMonth = () => { setMonth(() => freshMonth()); setShowReset(false); };

  // Copy from another month
  const existingMonths = Object.keys(data.months).filter(k => k !== mk && data.months[k].grossIncome > 0).sort().reverse();
  const copyFromMonth = (srcKey) => {
    const src = data.months[srcKey];
    if (!src) return;
    // Deep copy but with new IDs mapped
    const idMap = {};
    const mapItem = (item) => { const nid = gid(); idMap[item.id] = nid; return { ...item, id: nid }; };
    const newFp1 = src.fp1.map(mapItem);
    const newFp2 = src.fp2.map(mapItem);
    const newDivItems = (src.divItems || []).map(mapItem);
    setMonth(() => ({
      grossIncome: src.grossIncome,
      fp1: newFp1, fp2: newFp2,
      divisions: (src.divisions || DIVS).map(d => ({ ...d })),
      divItems: newDivItems,
      approval: {}, payment: {},
    }));
    setShowCopyFrom(false);
  };

  const prevMonth = () => {
    if (selMonth === 0) { setSelMonth(11); setSelYear(y => y - 1); }
    else setSelMonth(m => m - 1);
  };
  const nextMonth = () => {
    if (selMonth === 11) { setSelMonth(0); setSelYear(y => y + 1); }
    else setSelMonth(m => m + 1);
  };

  const divs = s.divisions || DIVS;
  const tabs = [
    { key: "fp1", label: "FP#1 חובות", icon: "📋" },
    { key: "fp2", label: "FP#2 תכנון", icon: "📊" },
    { key: "approve", label: "אישור", icon: "🔍" },
    { key: "approved", label: "מאושרות", icon: "✅" },
  ];

  const ApprovalRow = ({ id, desc, requestedAmt, extra }) => {
    const ap = s.approval[id] || {};
    const isA = !!ap.approved;
    const aAmt = ap.approvedAmount || 0;
    return (
      <div style={{ display: "grid", gridTemplateColumns: "1fr 80px 95px 75px", gap: "5px", alignItems: "center", padding: "7px 0", borderBottom: `1px solid ${C.bdr}08` }}>
        <div><div style={{ fontSize: "12px", color: isA ? C.tx : C.txd }}>{desc || "(ללא תיאור)"}</div>{extra && <div style={{ fontSize: "10px", color: C.txm }}>{extra}</div>}</div>
        <div style={{ textAlign: "center", fontFamily: "'JetBrains Mono',monospace", fontSize: "11px", color: C.txd }}>{fmt(Math.round(requestedAmt), cur)}</div>
        <div><input type="number" value={isA ? aAmt : ""} placeholder="סכום" onChange={e => { const v = parseFloat(e.target.value) || 0; setApproval(id, v > 0, v); }}
          style={{ background: C.bg, border: `1px solid ${isA ? C.green : C.bdr}`, color: isA ? C.green : C.txd, borderRadius: "5px", padding: "4px 5px", fontSize: "11px", fontFamily: "'JetBrains Mono',monospace", textAlign: "center", outline: "none", width: "85px" }} /></div>
        <div style={{ display: "flex", justifyContent: "center" }}>
          <button onClick={() => { if (isA) setApproval(id, false, 0); else setApproval(id, true, Math.round(requestedAmt)); }}
            style={{ background: isA ? C.greenD : `${C.bdr}55`, border: `1px solid ${isA ? C.green : C.bdr}44`, color: isA ? C.green : C.txm, borderRadius: "5px", padding: "3px 8px", cursor: "pointer", fontSize: "10px", fontWeight: 700, fontFamily: "inherit" }}>
            {isA ? "✓" : "אשר"}
          </button>
        </div>
      </div>
    );
  };

  const PaymentRow = ({ id, desc, approvedAmt, section }) => {
    const py = s.payment[id] || {};
    const pAmt = py.paidAmount || 0;
    const status = py.status || "unpaid";
    const stLabel = status === "paid" ? "שולם" : status === "partial" ? "חלקי" : "ממתין";
    const stColor = status === "paid" ? C.green : status === "partial" ? C.amber : C.txm;
    return (
      <div style={{ display: "grid", gridTemplateColumns: "1fr 75px 85px 75px 70px", gap: "5px", alignItems: "center", padding: "6px 0", borderBottom: `1px solid ${C.bdr}08` }}>
        <div><div style={{ fontSize: "11px", color: C.tx }}>{desc}</div><div style={{ fontSize: "9px", color: C.txm }}>{section}</div></div>
        <div style={{ textAlign: "center", fontFamily: "'JetBrains Mono',monospace", fontSize: "11px", color: C.tx }}>{fmt(approvedAmt, cur)}</div>
        <div><input type="number" value={pAmt || ""} placeholder="0" onChange={e => setPayment(id, parseFloat(e.target.value) || 0)}
          style={{ background: C.bg, border: `1px solid ${C.bdr}`, color: pAmt > 0 ? C.cyan : C.txd, borderRadius: "5px", padding: "4px 5px", fontSize: "11px", fontFamily: "'JetBrains Mono',monospace", textAlign: "center", outline: "none", width: "75px" }} /></div>
        <div style={{ textAlign: "center", fontFamily: "'JetBrains Mono',monospace", fontSize: "11px", color: C.txd }}>{fmt(approvedAmt - pAmt, cur)}</div>
        <div style={{ display: "flex", justifyContent: "center" }}><span style={{ fontSize: "10px", fontWeight: 600, color: stColor, background: `${stColor}15`, padding: "2px 8px", borderRadius: "8px", whiteSpace: "nowrap" }}>{stLabel}</span></div>
      </div>
    );
  };

  return (
    <div style={{ fontFamily: "'Segoe UI','Noto Sans Hebrew',system-ui,sans-serif", background: C.bg, color: C.tx, minHeight: "100vh", direction: "rtl" }}>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

      {/* HEADER */}
      <div style={{ background: `linear-gradient(180deg,${C.card2},${C.bg})`, borderBottom: `1px solid ${C.bdr}`, padding: "14px 14px 0", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ maxWidth: 960, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
            <h1 style={{ margin: 0, fontSize: "17px", fontWeight: 700 }}><span style={{ color: C.blue }}>BUZZ</span> תכנון פיננסי</h1>
            <div style={{ display: "flex", gap: "5px", alignItems: "center" }}>
              <div style={{ display: "flex", borderRadius: "5px", overflow: "hidden", border: `1px solid ${C.bdr}` }}>
                {["₪", "$"].map(c => <button key={c} onClick={toggleCur} style={{ background: cur === c ? C.blue : "transparent", border: "none", color: cur === c ? "#fff" : C.txd, padding: "2px 9px", cursor: "pointer", fontSize: "11px", fontWeight: 600, fontFamily: "inherit" }}>{c}</button>)}
              </div>
              <button onClick={() => exportCSV(s, calcFp1, calcFp2, cur, mk)} style={{ background: C.greenD, border: `1px solid ${C.green}33`, color: C.green, padding: "2px 8px", borderRadius: "5px", cursor: "pointer", fontSize: "10px", fontFamily: "inherit", fontWeight: 600 }}>📥 ייצוא</button>
              <button onClick={() => setShowReset(true)} style={{ background: "transparent", border: `1px solid ${C.bdr}`, color: C.txm, padding: "2px 7px", borderRadius: "5px", cursor: "pointer", fontSize: "9px", fontFamily: "inherit" }}>איפוס חודש</button>
            </div>
          </div>

          {/* Month selector */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "12px", marginBottom: "12px", background: C.card, borderRadius: "10px", padding: "8px 16px", border: `1px solid ${C.bdr}` }}>
            <button onClick={prevMonth} style={{ background: "transparent", border: "none", color: C.txd, cursor: "pointer", fontSize: "16px", fontFamily: "inherit", padding: "2px 8px" }}>◀</button>
            <div style={{ textAlign: "center", minWidth: "140px" }}>
              <div style={{ fontSize: "18px", fontWeight: 700, color: C.blue }}>{MONTHS_HE[selMonth]}</div>
              <div style={{ fontSize: "12px", color: C.txd }}>{selYear}</div>
            </div>
            <button onClick={nextMonth} style={{ background: "transparent", border: "none", color: C.txd, cursor: "pointer", fontSize: "16px", fontFamily: "inherit", padding: "2px 8px" }}>▶</button>
            {existingMonths.length > 0 && (
              <button onClick={() => setShowCopyFrom(!showCopyFrom)} style={{ background: C.purpleD, border: `1px solid ${C.purple}33`, color: C.purple, padding: "3px 10px", borderRadius: "5px", cursor: "pointer", fontSize: "10px", fontFamily: "inherit", fontWeight: 600, marginRight: "8px" }}>📋 העתק מחודש</button>
            )}
          </div>

          {/* Copy from modal */}

                    <div>
                      <div style={{ fontSize: "12px", fontWeight: 700 }}>סיכום — {MONTHS_HE[selMonth]}</div>
                      <div style={{ fontSize: "10px", color: C.txd, marginTop: "2px" }}>
                        {approvedItems.filter(i => (s.payment[i.id]?.status) === "paid").length} שולמו · {approvedItems.filter(i => (s.payment[i.id]?.status) === "partial").length} חלקי · {approvedItems.filter(i => !s.payment[i.id]?.status || s.payment[i.id]?.status === "unpaid").length} ממתינים
                      </div>
                    </div>
                    <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: "18px", fontWeight: 700, color: C.cyan }}>{fmt(totalPaid, cur)}<span style={{ fontSize: "10px", color: C.txd, fontWeight: 400 }}> / {fmt(totalApproved, cur)}</span></div>
                  </div>
                </div>
              )}
            </div>
          );
        })()}
      </div>

      {/* Reset modal */}
      {showReset && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }} onClick={() => setShowReset(false)}>
          <div onClick={e => e.stopPropagation()} style={{ background: C.card, borderRadius: "14px", padding: "22px", border: `1px solid ${C.bdr}`, maxWidth: 320, width: "90%", textAlign: "center" }}>
            <div style={{ fontSize: "24px", marginBottom: "6px" }}>⚠️</div>
            <h3 style={{ margin: "0 0 4px", fontSize: "13px" }}>איפוס {MONTHS_HE[selMonth]} {selYear}?</h3>
            <p style={{ color: C.txd, fontSize: "11px", margin: "0 0 14px" }}>רק החודש הנוכחי יאופס.</p>
            <div style={{ display: "flex", gap: "8px", justifyContent: "center" }}>
              <button onClick={() => setShowReset(false)} style={{ background: C.bg, border: `1px solid ${C.bdr}`, color: C.txd, padding: "6px 14px", borderRadius: "6px", cursor: "pointer", fontSize: "11px", fontFamily: "inherit" }}>ביטול</button>
              <button onClick={resetMonth} style={{ background: C.red, border: "none", color: "#fff", padding: "6px 14px", borderRadius: "6px", cursor: "pointer", fontSize: "11px", fontFamily: "inherit", fontWeight: 600 }}>אפס</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
