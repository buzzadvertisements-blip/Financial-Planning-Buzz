function UNum({id,val,onChange,color,w}){

  return h("input",{type:"number",defaultValue:val??"",onInput:onInp,onBlur:e=>{if(t.current)clearTimeout(t.current);go(e)},
    style:{background:C.bg,border:"1px solid "+C.bdr,color:color||"#60a5fa",borderRadius:"5px",padding:"5px 6px",fontSize:"12px",fontFamily:"'JetBrains Mono',monospace",textAlign:"center",outline:"none",width:w||"80px"}});
}
