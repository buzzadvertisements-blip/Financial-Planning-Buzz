// ===== Debounced Number Input - keeps local state while typing =====
function DNI(props){
  const{value,onChange,color,w}=props;
  const[local,setLocal]=useState(String(value||""));
  const timer=useRef(null);
  const prev=useRef(value);
  // Sync from parent only if value changed externally
  useEffect(()=>{if(value!==prev.current){setLocal(String(value||""));prev.current=value}},[value]);
  const handleChange=e=>{
    const v=e.target.value;
    setLocal(v);
    if(timer.current)clearTimeout(timer.current);
    timer.current=setTimeout(()=>{const num=parseFloat(v)||0;prev.current=num;onChange(num)},600);
  };
  return h("input",{type:"number",value:local,onChange:handleChange,style:{background:C.bg,border:"1px solid "+C.bdr,color:color||"#60a5fa",borderRadius:"5px",padding:"5px 6px",fontSize:"12px",fontFamily:"'JetBrains Mono',monospace",textAlign:"center",outline:"none",width:w||"80px"},onFocus:e=>e.currentTarget.style.borderColor=C.blue,onBlur:e=>{e.currentTarget.style.borderColor=C.bdr;const num=parseFloat(local)||0;prev.current=num;onChange(num);if(timer.current)clearTimeout(timer.current)}});
}

    const v=e.target.value;setLocal(v);
    if(timer.current)clearTimeout(timer.current);

}
