function UNum({id,val,onChange,color,w}){

    style:{background:C.bg,border:"1px solid "+C.bdr,color:color||"#2563eb",borderRadius:"5px",padding:"5px 6px",fontSize:"12px",fontFamily:"'JetBrains Mono',monospace",textAlign:"center",outline:"none",width:w||"80px"}});
}

function CC(props){
  const ref=useRef(null),cr=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(cr.current)cr.current.destroy();
    try{cr.current=new Chart(ref.current,props.cfg)}catch(e){console.error(e)}
    return()=>{if(cr.current){cr.current.destroy();cr.current=null}};
  });
  return h("canvas",{ref,style:{maxHeight:props.ht||"250px",width:"100%"}});
}
